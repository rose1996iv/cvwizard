  <head>

    <title>ResumeAI - Intelligent CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lato:wght@300;400;700&family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      
      /* New & Robust Print Styling */
      @media print {
        /* Hide UI elements during print */
        nav, .no-print, button, .wizard-col, .theme-editor-card {
          display: none !important;
        }
        
        /* Reset containers for clean print */
        html, body, #root {
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: visible !important;
          background: white !important;
        }

        /* Target the main preview column and its parents */
        main {
          display: block !important;
          padding: 0 !important;
          margin: 0 !important;
        }

        .lg\:col-span-7 {
          width: 100% !important;
          position: static !important;
          display: block !important;
        }

        /* The actual CV paper */
        #resume-preview {
          position: relative !important;
          margin: 0 auto !important;
          box-shadow: none !important;
          transform: none !important;
          width: 210mm !important; /* A4 Width */
          min-height: 297mm !important;
          left: 0 !important;
          top: 0 !important;
          page-break-after: always;
          
          /* Ensure colors print */
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Ensure scrollable containers don't clip */
        .overflow-auto, .overflow-y-auto {
          overflow: visible !important;
        }
      }
    </style>
  <script type="importmap">

  }
}
</script>
